# bridge_config.yaml

# 配置 8 个推进器 (Fan) 的控制命令
# 方向：ROS_TO_GZ (对应原代码中的 ])
- ros_topic_name: "/model/UnderWater_Robot/joint/fan1/cmd_thrust"
  gz_topic_name: "/model/UnderWater_Robot/joint/fan1/cmd_thrust"
  ros_type_name: "std_msgs/msg/Float64"
  gz_type_name: "ignition.msgs.Double"
  direction: ROS_TO_GZ

